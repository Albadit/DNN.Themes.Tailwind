<style type="text/tailwindcss">
/* ==========================================================================
   Base Styles
   ========================================================================== */

@layer base {
  /* Base body styles */
  body {
    font-family: var(--font-sans);
    color: var(--color-gray-800);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Smooth scrolling */
  html {
    scroll-behavior: smooth;
  }
}

/* ==========================================================================
   Global Components
   ========================================================================== */

@layer components {

}

/* ==========================================================================
   Header Overrides
   ========================================================================== */

@layer components {
  .hamburger {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 2rem;
    height: 2rem;
    padding: 0;
    background: none;
    border: none;
    cursor: pointer;
    gap: 5px;
  }

  .hamburger span {
    display: block;
    width: 1.25rem;
    height: 2px;
    background-color: white;
    border-radius: 1px;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .hamburger.open span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }

  .hamburger.open span:nth-child(2) {
    opacity: 0;
  }

  .hamburger.open span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }
}

/* Mobile menu: smooth slide transition */
#mobile-menu {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.35s ease, opacity 0.3s ease;
  opacity: 0;
  overflow: hidden;
}

#mobile-menu > * {
  overflow: hidden;
}

#mobile-menu.open {
  grid-template-rows: 1fr;
  opacity: 1;
}

/* Mobile menu: stack items vertically */
#mobile-menu ul {
  flex-direction: column;
  align-items: stretch;
  gap: 0.125rem;
}

#mobile-menu > div > ul > li > a,
#mobile-menu > div > ul > li > span {
  width: 100%;
  justify-content: flex-start;
  padding: 0.75rem 1rem;
  border-radius: 0.375rem;
}

#mobile-menu > div > ul > li > a:hover {
  background-color: rgba(255, 255, 255, 0.1);
}

/* Hide the desktop dropdown chevron on mobile */
#mobile-menu > div > ul > li > a > svg {
  display: none;
}

/* Make sub-menus always visible on mobile (no hover needed) */
#mobile-menu .group > div {
  position: static;
  visibility: visible;
  opacity: 1;
  width: 100%;
  background: transparent;
  box-shadow: none;
  ring: unset;
  margin-top: 0;
  border-radius: 0;
}

#mobile-menu .group > div ul {
  padding: 0;
}

#mobile-menu .group > div ul li a {
  color: rgba(255, 255, 255, 0.7);
  background: transparent;
  padding-left: 2rem;
  font-size: 0.875rem;
}

#mobile-menu .group > div ul li a:hover {
  color: white;
  background-color: rgba(255, 255, 255, 0.1);
}

/* Remove ring/shadow from mobile sub-menus */
#mobile-menu .group > div {
  --tw-ring-shadow: none;
  --tw-shadow: none;
  box-shadow: none;
}

/* ==========================================================================
   DNN Module Drag & Drop
   ========================================================================== */

/* Floating modules need a z-index above the sticky header (z-50 = 50) */
.DnnModule.floating {
  z-index: 100;
  position: absolute;
}

.dnnDragHint {
  cursor: move;
  z-index: 101;
}

/* Drop zone placeholder */
.dnnSortable-placeholder {
  background: rgba(0, 111, 238, 0.08);
  border: 2px dashed var(--color-primary-400, #60a5fa);
  border-radius: 0.375rem;
  min-height: 3rem;
  margin: 0.5rem 0;
}

/* ==========================================================================
   Footer Overrides
   ========================================================================== */

.footer-section {
  background-color: var(--color-gray-900);
  color: var(--color-gray-300);
  font-size: 0.875rem;
  line-height: 1.6;
}

.footer-section a {
  color: var(--color-gray-300);
  text-decoration: none;
  transition: color 0.15s ease;
}

.footer-section a:hover {
  color: white;
}

.footer-heading {
  color: white;
  font-size: 0.875rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 1rem;
}

/* Footer: wrap items and allow multi-row on mobile */
.footer-section nav ul {
  flex-wrap: wrap;
  gap: 0.5rem 0;
}

.footer-section nav ul li a,
.footer-section nav ul li span {
  font-size: 0.875rem;
  padding: 0.5rem 1rem;
  color: rgba(255, 255, 255, 0.8);
}

.footer-section nav ul li a:hover {
  color: white;
  background-color: rgba(255, 255, 255, 0.1);
  border-radius: 0.375rem;
}

/* Hide dropdown arrows and sub-menus in footer */
.footer-section nav ul li > a > svg {
  display: none;
}

.footer-section nav .group > div {
  display: none;
}

/* On mobile, stack footer nav items vertically */
@media (max-width: 639px) {
  .footer-section nav ul {
    flex-direction: column;
    align-items: flex-start;
  }

  .footer-section nav ul li a,
  .footer-section nav ul li span {
    padding: 0.5rem 0;
  }
}
</style>
